<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Details - Online Quiz System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="navbar" data-nav="auth" data-active="results"></div>

    <main id="main-content" class="container page">
        <section class="result-container">
            <div class="result-header">
                <h2>Quiz Result Details</h2>
                <a href="/results" class="btn btn-outline">Back to Results</a>
            </div>

            <div id="result-detail-content">
                <p class="loading-message">Loading result details...</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        // Check authentication and load result details
        async function checkAuthAndLoadResultDetails() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) {
                    throw new Error('Not authenticated');
                }

                const data = await response.json();
                if (data.status !== 'success') {
                    throw new Error('Invalid response');
                }

                // Load navigation bar
                loadNavbar(true, data.data.role);

                // Get result ID from URL path (/results/:id)
                const pathParts = window.location.pathname.split('/');
                const resultId = pathParts[pathParts.length - 1];

                // Validate that it's a numeric ID
                if (!resultId || isNaN(resultId) || resultId === 'results') {
                    window.location.href = '/results';
                    return;
                }

                // Load result details
                await loadResultDetails(resultId);
            } catch (error) {
                // Not authenticated - redirect to login
                console.warn('Not authenticated:', error.message);
                window.location.href = '/login';
            }
        }

        // Load navigation bar based on auth status
        function loadNavbar(isAuthenticated, userRole = 'student') {
            const navbar = document.getElementById('navbar');

            if (isAuthenticated) {
                // Authenticated user navbar
                navbar.innerHTML = `
                    <nav class="navbar">
                        <div class="container">
                            <a href="/" class="nav-logo">Online Quiz System</a>
                            <div class="nav-links">
                                <a href="/dashboard" class="nav-link">Dashboard</a>
                                <a href="/results" class="nav-link">Results</a>
                                <a href="#" id="logout-link" class="nav-link">Logout</a>
                            </div>
                        </div>
                    </nav>
                `;

                // Add logout event listener
                const logoutLink = navbar.querySelector('#logout-link');
                if (logoutLink) {
                    logoutLink.addEventListener('click', async (e) => {
                        e.preventDefault();
                        await logout();
                    });
                }
            } else {
                // Guest navbar
                navbar.innerHTML = `
                    <nav class="navbar">
                        <div class="container">
                            <a href="/" class="nav-link active">Home</a>
                            <a href="/login" class="nav-link">Login</a>
                            <a href="/register" class="nav-link">Register</a>
                        </div>
                    </nav>
                `;
            }
        }

        // Handle logout
        async function logout() {
            try {
                const response = await fetch('/api/auth/logout', {
                    method: 'POST'
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    throw new Error(data.message || 'Logout failed');
                }
            } catch (error) {
                console.error('Logout error:', error);
                // Even if logout fails on server, redirect to login
                window.location.href = '/login';
            }
        }

        // Load result details by ID
        async function loadResultDetails(resultId) {
            try {
                // Fetch attempt data
                const attemptResponse = await fetch(`/api/attempts/${resultId}`);
                if (!attemptResponse.ok) {
                    if (attemptResponse.status === 404) {
                        window.location.href = '/results';
                        return;
                    }
                    throw new Error('Failed to load attempt details');
                }

                const attemptData = await attemptResponse.json();
                if (attemptData.status !== 'success' || !attemptData.data) {
                    throw new Error('Invalid attempt data');
                }
                const attempt = attemptData.data;

                // Add styling class to container
                const resultContainer = document.querySelector('section.result-container');
                if (resultContainer) {
                    resultContainer.classList.add('result-details-page');
                }

                // Fetch quiz details for questions and options
                const quizResponse = await fetch(`/api/quizzes/${attempt.quiz_id}`);
                if (!quizResponse.ok) {
                    throw new Error('Failed to load quiz details');
                }
                const quizData = await quizResponse.json();
                if (quizData.status !== 'success' || !quizData.data) {
                    throw new Error('Invalid quiz data');
                }
                const quiz = quizData.data;

                // Determine date to display
                const dateString = attempt.submitted_at || attempt.started_at || attempt.created_at;
                const date = new Date(dateString);
                const formattedDate = date.toLocaleDateString() + ' ' +
                                    date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                // Determine pass/fail (assuming 60% passing)
                let percentage = attempt.percentage;
                if (percentage === undefined && attempt.score !== undefined && attempt.total_questions !== undefined) {
                    percentage = Math.round((attempt.score / attempt.total_questions) * 100);
                } else if (percentage === undefined) {
                    percentage = 0;
                }
                const passed = percentage >= 60;

                // Build HTML
                let detailsHTML = `
                    <div class="result-summary">
                        <div class="result-score-badge ${passed ? 'passed' : 'failed'}">
                            <span class="badge-score">${percentage}%</span>
                            <span class="badge-label">${passed ? 'PASSED' : 'FAILED'}</span>
                        </div>
                        <div class="result-info">
                            <h3>${quiz.title}</h3>
                            <p><strong>Score:</strong> ${attempt.score || '?'} out of ${attempt.total_questions || '?'}</p>
                            <p><strong>Percentage:</strong> ${percentage}%</p>
                            <p><strong>Completed:</strong> ${formattedDate}</p>
                        </div>
                    </div>
                `;

                // Add question review if we have answers
                if (attempt.answers && Array.isArray(attempt.answers) && attempt.answers.length > 0) {
                    detailsHTML += `
                        <div class="question-breakdown">
                            <h3>Question Review</h3>
                            <ol class="question-list">
                    `;

                    attempt.answers.forEach(answer => {
                        // Find the question by id
                        const question = quiz.questions.find(q => q.id === answer.question_id);
                        if (!question) {
                            // If question not found, show a placeholder
                            detailsHTML += `
                                <li class="question-item">
                                    <div class="question-header">
                                        <span class="question-number">Question ${answer.question_id}:</span>
                                        <span class="question-text">Question not found</span>
                                    </div>
                                </li>
                            `;
                            return;
                        }

                        // Find selected option object (if any)
                        const selectedOption = answer.selected_option_id !== null ?
                            question.options.find(opt => opt.id === answer.selected_option_id) : null;
                        // Find correct option object
                        const correctOption = question.options.find(opt => opt.is_correct === 1);
                        const isCorrect = answer.is_correct === 1;

                        detailsHTML += `
                            <li class="question-item">
                                <div class="question-header">
                                    <span class="question-number">Question ${question.id}:</span>
                                    <span class="question-text">${question.question_text}</span>
                                </div>
                                <div class="options-list">
                        `;

                        question.options.forEach(option => {
                            let className = '';
                            if (option.id === correctOption.id) {
                                className += ' correct-option';
                            }
                            if (selectedOption && option.id === selectedOption.id) {
                                className += ' selected-option';
                                if (!isCorrect) {
                                    className += ' wrong-selection';
                                }
                            }

                            detailsHTML += `
                                <label class="option-label ${className.trim()}">
                                    <input type="radio" name="question_${question.id}" value="${option.id}" ${selectedOption && option.id === selectedOption.id ? 'checked' : ''} disabled>
                                    <span class="option-text">${option.option_text}</span>
                                </label>
                            `;
                        });

                        detailsHTML += `
                                </div>
                                ${selectedOption === null ? `<p class="note">Not answered</p>` : ''}
                                ${!isCorrect && correctOption ? `<p class="correct-answer">Correct answer: ${correctOption.option_text}</p>` : ''}
                            </li>
                        `;
                    });

                    detailsHTML += `
                            </ol>
                        </div>
                    `;
                }

                // Add actions
                detailsHTML += `
                    <div class="result-actions">
                        <a href="/results" class="btn btn-outline">Back to Results</a>
                    </div>
                `;

                // Update the content
                document.getElementById('result-detail-content').innerHTML = detailsHTML;
            } catch (error) {
                console.error('Error loading result details:', error);
                document.getElementById('result-detail-content').innerHTML =
                    `<div class="error-message">Error loading result details: ${error.message}</div>`;
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', checkAuthAndLoadResultDetails);
    </script>
</body>
</html>
