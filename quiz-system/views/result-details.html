<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Details - Online Quiz System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Custom styles for the result details page */
        .result-details-page .result-container {
            max-width: var(--form-max-width);
            margin: 0 auto;
            padding: var(--space-6) 0;
        }

        .result-details-page .result-summary {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: var(--space-6);
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-6);
            align-items: center;
        }

        .result-details-page .result-score-badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius);
            text-align: center;
            min-width: 120px;
        }

        .result-details-page .result-score-badge .badge-score {
            font-size: 2.25rem;
            font-weight: 700;
            display: block;
        }

        .result-details-page .result-score-badge .badge-label {
            font-size: 1.125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-details-page .result-score-badge.passed {
            background: var(--success-light);
            color: var(--success);
        }

        .result-details-page .result-score-badge.failed {
            background: var(--danger-light);
            color: var(--danger);
        }

        .result-details-page .result-info {
            flex: 1;
            min-width: 150px;
        }

        .result-details-page .result-info h3 {
            margin-top: 0;
            margin-bottom: var(--space-4);
        }

        .result-details-page .result-info p {
            margin: var(--space-2) 0;
        }

        .result-details-page .result-header .btn-outline {
            margin-top: var(--space-4);
        }

        .result-details-page #result-detail-content .loading-message {
            text-align: center;
            padding: var(--space-8);
        }
    </style>
</head>
<body class="result-details-page">
    <div id="navbar" data-nav="auth" data-active="results"></div>

    <main id="main-content" class="container page">
        <section class="result-container">
            <div class="result-header">
                <h2>Quiz Result Details</h2>
                <a href="/results" class="btn btn-outline">Back to Results</a>
            </div>

            <div id="result-detail-content">
                <p class="loading-message">Loading result details...</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        // Check authentication and load result details
        async function checkAuthAndLoadResultDetails() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) {
                    throw new Error('Not authenticated');
                }

                const data = await response.json();
                if (data.status === 'success') {
                    // Load navigation bar
                    loadNavbar(true, data.data.role);

                    // Get result ID from URL path (/results/:id)
                    const pathParts = window.location.pathname.split('/');
                    const resultId = pathParts[pathParts.length - 1];

                    // Validate that it's a numeric ID
                    if (!resultId || isNaN(resultId) || resultId === 'results') {
                        window.location.href = '/results';
                        return;
                    }

                    // Load result details
                    loadResultDetails(resultId);
                } else {
                    throw new Error('Invalid response');
                }
            } catch (error) {
                // Not authenticated - redirect to login
                console.warn('Not authenticated:', error.message);
                window.location.href = '/login';
            }
        }

        // Load navigation bar based on auth status
        function loadNavbar(isAuthenticated, userRole = 'student') {
            const navbar = document.getElementById('navbar');

            if (isAuthenticated) {
                // Authenticated user navbar
                navbar.innerHTML = `
                    <nav class="navbar">
                        <div class="container">
                            <a href="/" class="nav-logo">Online Quiz System</a>
                            <div class="nav-links">
                                <a href="/dashboard" class="nav-link">Dashboard</a>
                                <a href="/results" class="nav-link">Results</a>
                                <a href="#" id="logout-link" class="nav-link">Logout</a>
                            </div>
                        </div>
                    </nav>
                `;

                // Add logout event listener
                const logoutLink = navbar.querySelector('#logout-link');
                if (logoutLink) {
                    logoutLink.addEventListener('click', async (e) => {
                        e.preventDefault();
                        await logout();
                    });
                }
            } else {
                // Guest navbar
                navbar.innerHTML = `
                    <nav class="navbar">
                        <div class="container">
                            <a href="/" class="nav-logo">Online Quiz System</a>
                            <div class="nav-links">
                                <a href="/" class="nav-link active">Home</a>
                                <a href="/login" class="nav-link">Login</a>
                                <a href="/register" class="nav-link">Register</a>
                            </div>
                        </div>
                    </nav>
                `;
            }
        }

        // Handle logout
        async function logout() {
            try {
                const response = await fetch('/api/auth/logout', {
                    method: 'POST'
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    throw new Error(data.message || 'Logout failed');
                }
            } catch (error) {
                console.error('Logout error:', error);
                // Even if logout fails on server, redirect to login
                window.location.href = '/login';
            }
        }

        // Load result details by ID
        async function loadResultDetails(resultId) {
            try {
                const response = await fetch(`/api/attempts/${resultId}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        window.location.href = '/results';
                        return;
                    }
                    throw new Error('Failed to load result details');
                }

                const data = await response.json();
                const container = document.getElementById('result-detail-content');

                if (data.status === 'success' && data.data) {
                    const attempt = data.data;

                    // Get quiz title from the attempt object (might be in different places)
                    const quizTitle = attempt.quiz_title ||
                                     (attempt.quiz && attempt.quiz.title) ||
                                     'Unknown Quiz';

                    // Format date - try submitted_at first, then started_at, then created_at
                    const dateString = attempt.submitted_at ||
                                      attempt.started_at ||
                                      attempt.created_at;
                    const date = new Date(dateString);
                    const formattedDate = date.toLocaleDateString() + ' ' +
                                        date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    // Determine if passed (assuming 60% is passing)
                    // Calculate percentage if not directly available
                    let percentage = attempt.percentage;
                    if (percentage === undefined && attempt.score !== undefined && attempt.total_questions !== undefined) {
                        percentage = Math.round((attempt.score / attempt.total_questions) * 100);
                    } else if (percentage === undefined) {
                        percentage = 0; // fallback
                    }

                    const passed = percentage >= 60;

                    let detailsHTML = `
                        <div class="result-summary">
                            <div class="result-score-badge ${passed ? 'passed' : 'failed'}">
                                <span class="badge-score">${percentage}%</span>
                                <span class="badge-label">${passed ? 'PASSED' : 'FAILED'}</span>
                            </div>
                            <div class="result-info">
                                <h3>${quizTitle}</h3>
                                <p><strong>Score:</strong> ${attempt.score || '?'} out of ${attempt.total_questions || '?'}</p>
                                <p><strong>Percentage:</strong> ${percentage}%</p>
                                <p><strong>Completed:</strong> ${formattedDate}</p>
                            </div>
                        </div>
                    `;

                    // Add question-by-question breakdown if available
                    if (attempt.answers && Array.isArray(attempt.answers) && attempt.answers.length > 0) {
                        // We would need the questions and options to show detailed breakdown
                        // Since we don't have that from this endpoint alone, we'll show a simplified view
                        detailsHTML += `
                            <div class="question-breakdown">
                                <h3>Answer Summary</h3>
                                <p>Detailed question-by-question review is not available in this view.</p>
                                <p>Your answers have been recorded and can be reviewed by your instructor if applicable.</p>
                            </div>
                        ";
                    } else if (attempt.answers) {
                        detailsHTML += `
                            <div class="note">
                                <p>Answer details are not available for this attempt.</p>
                            </div>
                        ";
                    }

                    detailsHTML += `
                        <div class="result-actions">
                            <a href="/results" class="btn btn-outline">Back to Results</a>
                        </div>
                    `;

                    container.innerHTML = detailsHTML;
                } else {
                    throw new Error('Invalid result data');
                }
            } catch (error) {
                console.error('Error loading result details:', error);
                document.getElementById('result-detail-content').innerHTML =
                    `<div class="error-message">Error loading result details: ${error.message}</div>`;
            }
        }

        // Initialize page
        document.addEventListener('DOMContentOLD', checkAuthAndLoadResultDetails);
    </script>
</body>
</html>
