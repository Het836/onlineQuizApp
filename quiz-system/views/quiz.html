<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz System - Quiz</title>
    <link rel="stylesheet" href="/css/style.css">
<style>
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .quiz-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .quiz-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #333;
        }
        .quiz-description {
            font-size: 1.2rem;
            color: #666;
        }
        .quiz-body {
            margin-bottom: 30px;
        }
        .question {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 4px solid #007bff;
        }
        .question-number {
            font-weight: bold;
            color: #007bff;
            margin-bottom: 10px;
            display: block;
        }
        .question-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
            min-height: 48px;
        }
        .options {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option-item {
            margin-bottom: 12px;
        }
        .option-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .option-label:hover {
            background: #f8f9fa;
            border-color: #bbb;
        }
        .option-label input[type="radio"] {
            margin-right: 10px;
            width: 16px;
            height: 16px;
        }
        .option-text {
            flex: 1;
            font-size: 1rem;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #666;
        }
        .error {
            text-align: center;
            padding: 40px;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            margin: 20px 0;
        }
        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.2s ease;
        }
        .btn-back:hover {
            background: #5a6268;
            text-decoration: none;
        }
        .btn-submit {
            display: inline-block;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.2s ease;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background: #0069d9;
            text-decoration: none;
        }
</style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Online Quiz System</h1>
        </header>

        <main>
            <div class="quiz-container">
                <a href="/" class="btn-back">← Back to Home</a>

                <div id="quiz-container">
                    <!-- Quiz content will be loaded here -->
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </footer>
    </div>

    <script src="/js/quiz.js"></script>
</body>
</html>
