<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz System - Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="quiz-page">
    <div id="navbar" data-nav="guest" data-active=""></div>

    <main id="main-content" class="container page">
        <div class="quiz-wrapper">
            <a href="/" class="btn-back" id="btn-back-home">← Back to Home</a>
            <div id="questions-container">
                <!-- Quiz content will be loaded here -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/components/navbar.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/quiz.js"></script>
    <script>
        // Set navbar based on auth status and update back button
        document.addEventListener('DOMContentLoaded', async () => {
            const navbar = document.getElementById('navbar');
            const backButton = document.getElementById('btn-back-home');

            try {
                const response = await fetch('/api/auth/me');
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'success') {
                        // User is authenticated
                        navbar.dataset.nav = 'auth';
                        navbar.dataset.active = ''; // no active tab for quiz page
                        // Update back button to go to dashboard
                        backButton.href = '/dashboard';
                        backButton.textContent = '← Back to Dashboard';
                        return;
                    }
                }
                // If we get here, user is not authenticated
                navbar.dataset.nav = 'guest';
                navbar.dataset.active = '';
                backButton.href = '/';
                backButton.textContent = '← Back to Home';
            } catch (error) {
                // Not authenticated - show guest nav
                navbar.dataset.nav = 'guest';
                navbar.dataset.active = '';
                backButton.href = '/';
                backButton.textContent = '← Back to Home';
                console.warn('Auth check failed:', error.message);
            }
        });
    </script>
</body>
</html>
