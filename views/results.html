<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Online Quiz System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Navbar will be injected by JavaScript -->
    <nav id="navbar"></nav>

    <main id="main-content" class="container">
        <section class="results-page">
            <div class="results-header">
                <h1>My Quiz Results</h1>
                <div class="stats-row" id="stats-container">
                    <!-- Stats will be injected here -->
                </div>
                <a href="/dashboard" class="btn btn-outline">← Back to Dashboard</a>
            </div>

            <div id="results-content">
                <p class="loading-message">Loading your results...</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        // Check authentication and load results
        async function checkAuthAndLoadResults() {
            try {
                const authResponse = await fetch('/api/auth/me');
                if (!authResponse.ok) {
                    throw new Error('Not authenticated');
                }

                const authData = await authResponse.json();
                if (authData.status !== 'success') {
                    throw new Error('Invalid auth response');
                }

                const userId = authData.data.id;

                // Load navigation bar
                loadNavbar(true, authData.data.role);

                // Load user's results
                await loadUserResults(userId);
            } catch (error) {
                // Not authenticated - redirect to login
                console.warn('Not authenticated:', error.message);
                window.location.href = '/login';
            }
        }

        // Load navigation bar based on auth status
        function loadNavbar(isAuthenticated, userRole = 'student') {
            const navbar = document.getElementById('navbar');

            if (isAuthenticated) {
                // Authenticated user navbar
                navbar.innerHTML = `
                    <nav class="navbar">
                        <div class="container">
                            <div class="logo">Online Quiz System</div>
                            <ul class="nav-links">
                                <li><a href="/dashboard" class="active">Dashboard</a></li>
                                <li><a href="/results">Results</a></li>
                                <li><a href="/profile">Profile</a></li>
                                <li><a href="#" id="logout-link">Logout</a></li>
                            </ul>
                            <button class="menu-toggle" aria-label="Toggle menu">
                                <span></span><span></span><span></span>
                            </button>
                        </div>
                    </nav>
                `;

                // Add logout event listener
                const logoutLink = navbar.querySelector('#logout-link');
                if (logoutLink) {
                    logoutLink.addEventListener('click', async (e) => {
                        e.preventDefault();
                        await logout();
                    });
                }

                // Add mobile menu toggle
                const menuToggle = navbar.querySelector('.menu-toggle');
                const navLinks = navbar.querySelector('.nav-links');
                if (menuToggle && navLinks) {
                    menuToggle.addEventListener('click', () => {
                        navLinks.classList.toggle('open');
                    });
                }
            } else {
                // Guest navbar
                navbar.innerHTML = `
                    <nav class="navbar">
                        <div class="container">
                            <div class="logo">Online Quiz System</div>
                            <ul class="nav-links">
                                <li><a href="/">Home</a></li>
                                <li><a href="/login">Login</a></li>
                                <li><a href="/register">Register</a></li>
                            </ul>
                            <button class="menu-toggle" aria-label="Toggle menu">
                                <span></span><span></span><span></span>
                            </button>
                        </div>
                    </nav>
                `;

                // Add mobile menu toggle for guest
                const menuToggle = navbar.querySelector('.menu-toggle');
                const navLinks = navbar.querySelector('.nav-links');
                if (menuToggle && navLinks) {
                    menuToggle.addEventListener('click', () => {
                        navLinks.classList.toggle('open');
                    });
                }
            }
        }

        // Handle logout
        async function logout() {
            try {
                const response = await fetch('/api/auth/logout', {
                    method: 'POST'
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    throw new Error(data.message || 'Logout failed');
                }
            } catch (error) {
                console.error('Logout error:', error);
                // Even if logout fails on server, redirect to login
                window.location.href = '/login';
            }
        }

        // Load user's quiz results and compute statistics
        async function loadUserResults(userId) {
            try {
                // Get all quizzes first
                const quizzesResponse = await fetch('/api/quizzes');
                if (!quizzesResponse.ok) {
                    throw new Error('Failed to load quizzes');
                }

                const quizzesData = await quizzesResponse.json();
                if (quizzesData.status !== 'success' || !Array.isArray(quizzesData.data)) {
                    throw new Error('Invalid quiz data format');
                }

                const quizzes = quizzesData.data;
                const userResults = [];

                // For each quiz, get its results and filter for current user
                for (const quiz of quizzes) {
                    try {
                        const quizResultsResponse = await fetch(`/api/quizzes/${quiz.id}/results`);
                        if (quizResultsResponse.ok) {
                            const quizResultsData = await quizResultsResponse.json();
                            if (quizResultsData.status === 'success' && Array.isArray(quizResultsData.data)) {
                                // Filter results to only include current user's attempts
                                const userAttempts = quizResultsData.data.filter(
                                    attempt => attempt.user_id === userId
                                );

                                // Add quiz title and other info to each attempt
                                userAttempts.forEach(attempt => {
                                    attempt.quiz_title = quiz.title;
                                    attempt.quiz_id = quiz.id;
                                });

                                userResults.push(...userAttempts);
                            }
                        }
                        // If quiz results fail, just skip this quiz (might be no attempts yet)
                    } catch (quizError) {
                        console.warn(`Could not load results for quiz ${quiz.id}:`, quizError.message);
                        // Continue with other quizzes
                    }
                }

                // Display results
                const container = document.getElementById('results-content');
                const statsContainer = document.getElementById('stats-container');

                if (userResults.length === 0) {
                    container.innerHTML = `
                        <div class="results-empty">
                            <h3>No results yet</h3>
                            <p>You haven't taken any quizzes yet. Go to the dashboard to start!</p>
                            <a href="/dashboard" class="btn btn-primary">Start a Quiz</a>
                        </div>
                    `;
                    statsContainer.innerHTML = ''; // No stats
                    return;
                }

                // Calculate statistics
                const totalAttempts = userResults.length;
                const scores = userResults.map(r => {
                    // Use percentage if available, otherwise calculate
                    if (r.percentage !== undefined) return r.percentage;
                    if (r.score && r.total_questions) return (r.score / r.total_questions) * 100;
                    return 0;
                });
                const averageScore = scores.reduce((sum, val) => sum + val, 0) / scores.length || 0;
                const highestScore = Math.max(...scores);

                // Format stats
                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <h3>Total Attempts</h3>
                        <div class="value">${totalAttempts}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Average Score</h3>
                        <div class="value">${Math.round(averageScore)}%</div>
                    </div>
                    <div class="stat-card">
                        <h3>Highest Score</h3>
                        <div class="value">${Math.round(highestScore)}%</div>
                    </div>
                `;

                // Sort results by date (newest first)
                userResults.sort((a, b) => {
                    const dateA = new Date(a.submitted_at || a.started_at || 0);
                    const dateB = new Date(b.submitted_at || b.started_at || 0);
                    return dateB - dateA;
                });

                // Build results HTML
                let resultsHTML = `
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>Quiz</th>
                                <th>Score</th>
                                <th>Percentage</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                userResults.forEach(result => {
                    // Format date
                    const date = new Date(result.submitted_at || result.started_at);
                    const formattedDate = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    // Score display
                    const score = result.score ?? 0;
                    const total = result.total_questions ?? 0;
                    const percentage = result.percentage !== undefined ? result.percentage :
                                      (total > 0 ? Math.round((score / total) * 100) : 0);

                    resultsHTML += `
                        <tr>
                            <td>${result.quiz_title || 'Unknown Quiz'}</td>
                            <td>${score}/${total}</td>
                            <td>${percentage}%</td>
                            <td>${formattedDate}</td>
                            <td>
                                <a href="/results/${result.id}" class="btn btn-sm btn-outline">View Details</a>
                            </td>
                        </tr>
                    `;
                });

                resultsHTML += `
                        </tbody>
                    </table>
                `;

                container.innerHTML = resultsHTML;
            } catch (error) {
                console.error('Error loading results:', error);
                document.getElementById('results-content').innerHTML =
                    `<div class="error-message">Error loading results: ${error.message}</div>`;
                document.getElementById('stats-container').innerHTML = '';
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', checkAuthAndLoadResults);
    </script>
</body>
</html>
