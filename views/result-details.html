<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Result Details</title>

    <link rel="stylesheet" href="/css/style.css">
</head>


<body>


<div class="container">

<header>
    <h1>Online Quiz System</h1>
</header>


<nav id="navbar"></nav>



<main>

<section class="result-details">

<div class="result-header">

<h2>Quiz Result Details</h2>

<a href="/results" class="btn btn-outline">
Back to Results
</a>

</div>


<div id="result-detail-content">

<p>
Loading result details...
</p>

</div>


</section>

</main>


<footer>

<p>
© 2026 Online Quiz System
</p>

</footer>


</div>




<script>


async function loadResultDetails(){


const container =
document.getElementById("result-detail-content");



try{


// get id from URL

const parts =
window.location.pathname.split("/");


const attemptId =
parts[parts.length-1];



if(!attemptId || isNaN(attemptId))
{
window.location.href="/results";
return;
}




const response =
await fetch(`/api/quizzes/attempts/${attemptId}`);



const data =
await response.json();



console.log("RESULT DATA:",data);



if(data.status !== "success")
{
throw new Error(data.message);
}




const attempt=data.data;



let percentage =
attempt.percentage ?? 
Math.round(
(attempt.correct_answers /
attempt.total_questions)*100
);



let html = `



<div class="result-card">


<h2>
${attempt.quiz?.title || "Quiz Result"}
</h2>


<div class="score-box">

<h1>
${percentage}%
</h1>

<p>
${percentage >=60 ? 
"PASSED":"FAILED"}
</p>

</div>



<div class="stats">


<p>
<b>Total Questions:</b>
${attempt.total_questions}
</p>


<p>
<b>Correct:</b>
${attempt.correct_answers}
</p>


<p>
<b>Wrong:</b>
${attempt.wrong_answers}
</p>


<p>
<b>Score:</b>
${attempt.score}
</p>


</div>



</div>



<h2>
Answer Review
</h2>



<div class="answer-review">

`;




// show answers

if(attempt.answers && attempt.answers.length){


attempt.answers.forEach((answer,index)=>{


html += `


<div class="answer-card">


<h3>
Question ${index+1}
</h3>


<p>
Question ID:
${answer.question_id}
</p>


<p>
Your Selected Option:
${answer.selected_option_id}
</p>



<p class="${answer.is_correct ? 
"correct":"wrong"}">


${answer.is_correct ?
"Correct Answer":
"Wrong Answer"}

</p>



</div>


`;


});


}

else{


html += `

<p>
No answer details found.
</p>

`;

}



html += `

</div>

<br>

<a href="/results" class="btn btn-outline">
Back
</a>


`;



container.innerHTML=html;



}

catch(error){


console.error(error);


container.innerHTML=`

<div class="error-message">

<h3>
Failed to load result
</h3>


<p>
${error.message}
</p>


</div>


`;

}


}




// navbar simple

function loadNavbar(){


document.getElementById("navbar").innerHTML=`

<nav class="navbar">


<a href="/dashboard">
Dashboard
</a>


<a href="/results">
Results
</a>


<a href="#" onclick="logout()">
Logout
</a>


</nav>

`;


}



async function logout(){


await fetch("/api/auth/logout",
{
method:"POST"
});


window.location.href="/login";


}




document.addEventListener(
"DOMContentLoaded",
()=>{

loadNavbar();

loadResultDetails();

}

);


</script>



</body>

</html>
