<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Quiz System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div id="navbar" data-nav="guest" data-active="login"></div>

    <main id="main-content" class="container page">
        <section class="auth-section">
            <div class="auth-card card">
                <div class="auth-header">
                    <div class="logo">Online Quiz System</div>
                    <h2>Welcome Back</h2>
                    <p class="text-sm text-secondary">Sign in to continue to your account</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                    </div>

                    <button type="submit" class="btn btn-primary w-full">Login</button>
                </form>

                <p class="auth-footer">
                    Forgot password? <a href="#">Reset it here</a>
                </p>
                <p class="auth-footer">
                    Don't have an account? <a href="/register" class="btn btn-outline">Register</a>
                </p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/components/navbar.js"></script>
    <script src="/js/main.js"></script>
    <script>
        // Login form handling
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Basic validation
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                // Login successful - redirect to dashboard
                window.location.href = '/dashboard';
            } catch (error) {
                showError('Login failed: ' + error.message);
                console.error('Login error:', error);
            }
        });

        function showError(message) {
            // Remove any existing error
            const existingError = document.querySelector('.error-message');
            if (existingError) {
                existingError.remove();
            }

            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            // Insert after form header
            const form = document.getElementById('login-form');
            form.insertAdjacentElement('beforebegin', errorDiv);
        }
    </script>
</body>
</html>
