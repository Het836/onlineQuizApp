<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Quiz System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div id="navbar" data-nav="guest" data-active="register"></div>

    <main id="main-content" class="container page">
        <section class="auth-section">
            <div class="auth-card card">
                <div class="auth-header">
                    <div class="logo">Online Quiz System</div>
                    <h2>Create Account</h2>
                    <p class="text-sm text-secondary">Join the learning community</p>
                </div>
                <form id="register-form">
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" required placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required minlength="6" placeholder="Create a password">
                    </div>

                    <div class="form-group">
                        <label for="role">Account Type</label>
                        <select id="role" name="role" required>
                            <option value="student">Student</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-full">Register</button>
                </form>

                <p class="auth-footer">
                    Already have an account? <a href="/login" class="btn btn-outline">Login</a>
                </p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        // Registration form handling
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const full_name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            // Basic validation
            if (!full_name || !email || !password) {
                showError('Please fill in all required fields');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ full_name, email, password, role })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Registration failed');
                }

                // Registration successful - redirect to login
                showSuccess('Registration successful! Please login.');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
            } catch (error) {
                showError('Registration failed: ' + error.message);
                console.error('Registration error:', error);
            }
        });

        function showError(message) {
            // Remove any existing error/success
            const existing = document.querySelector('.alert');
            if (existing) {
                existing.remove();
            }

            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-error';
            alertDiv.textContent = message;
            const form = document.getElementById('register-form');
            form.insertAdjacentElement('beforebegin', alertDiv);
        }

        function showSuccess(message) {
            // Remove any existing alert
            const existing = document.querySelector('.alert');
            if (existing) {
                existing.remove();
            }

            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success';
            alertDiv.textContent = message;
            const form = document.getElementById('register-form');
            form.insertAdjacentElement('beforebegin', alertDiv);
        }
    </script>
</body>
</html>
