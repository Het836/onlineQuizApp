<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Quiz System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="container">
        <header>
            <h1>Online Quiz System</h1>
        </header>

        <main id="main-content">
            <section class="auth-form">
                <div class="auth-card">
                    <h2>Create Your Account</h2>
                    <p>Join our quiz community and start testing your knowledge today!</p>

                    <form id="register-form">
                        <div class="form-group">
                            <label for="full_name">Full Name</label>
                            <input type="text" id="full_name" name="full_name" required placeholder="Enter your full name">
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your email">
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required minlength="6" placeholder="Create a password">
                        </div>

                        <div class="form-group">
                            <label for="role">Account Type</label>
                            <select id="role" name="role" required>
                                <option value="student">Student</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>

                    <p class="auth-footer">
                        Already have an account? <a href="/login">Login here</a>
                    </p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </footer>
    </div>
    <script src="/js/main.js"></script>
    <script>
        // Registration form handling
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const full_name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            // Basic validation
            if (!full_name || !email || !password) {
                alert('Please fill in all required fields');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ full_name, email, password, role })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Registration failed');
                }

                // Registration successful - redirect to login
                alert('Registration successful! Please login to continue.');
                window.location.href = '/login';
            } catch (error) {
                alert('Registration failed: ' + error.message);
                console.error('Registration error:', error);
            }
        });
    </script>
</body>
</html>
