<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Quizzes - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="navbar" data-nav="auth" data-active="quizzes"></div>

    <main id="main-content" class="container page">
        <!-- Page Header -->
        <section class="quiz-header">
            <div class="quiz-header-content">
                <h1>Manage Quizzes</h1>
                <div class="quiz-header-actions">
                    <div class="search-filter">
                        <input type="text" id="quizSearch" placeholder="Search quizzes...">
                        <select id="quizFilter">
                            <option value="all">All</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="quiz-count">
                        <span id="totalQuizCount">0</span> quizzes
                    </div>
                    <a href="/admin/quizzes/create" class="btn btn-primary">Create Quiz</a>
                </div>
            </div>
        </section>

        <!-- Quizzes Table -->
        <section class="quiz-table-section">
            <div class="table-responsive">
                <table class="quiz-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Total Questions</th>
                            <th>Duration (min)</th>
                            <th>Status</th>
                            <th>Created Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="quizTableBody">
                        <!-- Rows will be injected by JavaScript -->
                        <tr>
                            <td colspan="7" class="text-center text-muted">Loading quizzes...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/components/navbar.js"></script>
    <script src="/js/main.js"></script>
    <script>
        // Quiz Management Logic
        async function loadQuizzes() {
            try {
                const response = await fetch('/api/admin/quizzes');
                const data = await response.json();

                if (!response.ok || data.status !== 'success') {
                    throw new Error(data.message || 'Failed to load quizzes');
                }

                const quizzes = data.data;
                renderQuizTable(quizzes);
                updateQuizCount(quizzes.length);
            } catch (error) {
                console.error('Error loading quizzes:', error);
                showError('Failed to load quizzes: ' + error.message);
            }
        }

        function renderQuizTable(quizzes) {
            const tbody = document.getElementById('quizTableBody');
            if (quizzes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No quizzes found</td></tr>';
                return;
            }

            tbody.innerHTML = quizzes.map(quiz => {
                const statusClass = quiz.is_active ? 'status-active' : 'status-inactive';
                const statusText = quiz.is_active ? 'Active' : 'Inactive';
                let actionsHtml = '';
                if (quiz.total_attempts > 0) {
                    // Show toggle status button
                    const btnClass = quiz.is_active ? 'btn-outline-danger' : 'btn-outline-success';
                    const btnText = quiz.is_active ? 'Deactivate' : 'Activate';
                    actionsHtml = `
                        <button onclick="toggleQuizStatus(${quiz.id}, ${quiz.is_active})" class="btn btn-sm ${btnClass} toggle-status-btn">
                            ${btnText}
                        </button>
                    `;
                } else {
                    // Show delete button (no attempts)
                    actionsHtml = `
                        <button onclick="deleteQuiz(${quiz.id})" class="btn btn-sm btn-outline-danger">
                            Delete
                        </button>
                    `;
                }
                return `
                    <tr data-quiz-id="${quiz.id}">
                        <td>${escapeHtml(quiz.title)}</td>
                        <td>${escapeHtml(quiz.description)}</td>
                        <td>${quiz.total_questions || 0}</td>
                        <td>${quiz.duration_minutes}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>${new Date(quiz.created_at).toLocaleDateString()}</td>
                        <td class="actions-cell">
                            <a href="/admin/quizzes/${quiz.id}" class="btn btn-sm btn-outline-primary">View</a>
                            <a href="/admin/quizzes/${quiz.id}/edit" class="btn btn-sm btn-outline-secondary">Edit</a>
                            ${actionsHtml}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function toggleQuizStatus(quizId, currentIsActive) {
            if (!confirm(`Are you sure you want to ${currentIsActive ? 'deactivate' : 'activate'} this quiz?`)) {
                return;
            }
            try {
                const response = await fetch(`/api/admin/quizzes/${quizId}/toggle`, {
                    method: 'PUT'
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to toggle quiz status');
                }

                // Update UI immediately
                const newIsActive = !currentIsActive;
                const row = document.querySelector(`#quizTableBody tr[data-quiz-id="${quizId}"]`);
                if (row) {
                    const statusBadge = row.querySelector('.status-badge');
                    if (statusBadge) {
                        statusBadge.textContent = newIsActive ? 'Active' : 'Inactive';
                        statusBadge.className = `status-badge ${newIsActive ? 'status-active' : 'status-inactive'}`;
                    }
                    const toggleBtn = row.querySelector('.toggle-status-btn');
                    if (toggleBtn) {
                        toggleBtn.textContent = newIsActive ? 'Deactivate' : 'Activate';
                        toggleBtn.className = `btn btn-sm ${newIsActive ? 'btn-outline-danger' : 'btn-outline-success'} toggle-status-btn`;
                        toggleBtn.setAttribute('onclick', `toggleQuizStatus(${quizId}, ${newIsActive})`);
                    }
                }

                showSuccess(`${newIsActive ? 'Activated' : 'Deactivated'} quiz successfully`);
            } catch (error) {
                console.error('Error toggling quiz:', error);
                showError('Failed to toggle quiz: ' + error.message);
            }
        }

        function updateQuizCount(count) {
            document.getElementById('totalQuizCount').textContent = count;
        }

        function escapeHtml(text) {
            if (text == null) {
                return '';
            }
            const map = {
                '&': '&',
                '<': '<',
                '>': '>',
                '"': '"',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>'"]/g, m => map[m]);
        }

        async function deleteQuiz(quizId) {
            if (!confirm('Are you sure you want to delete this quiz? This action cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/quizzes/${quizId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to delete quiz');
                }

                // Reload quizzes
                loadQuizzes();
                showSuccess(data.message || 'Quiz deleted successfully');
            } catch (error) {
                console.error('Error deleting quiz:', error);
                showError('Failed to delete quiz: ' + error.message);
            }
        }

        function showError(message) {
            // Remove existing error banner
            const existing = document.querySelector('.error-banner');
            if (existing) existing.remove();

            const banner = document.createElement('div');
            banner.className = 'error-banner';
            banner.textContent = message;
            banner.style.backgroundColor = '#ffe6e6';
            banner.style.color = '#d32f2f';
            banner.style.padding = '1rem';
            banner.style.marginBottom = '1rem';
            banner.style.borderRadius = '4px';

            const mainContent = document.getElementById('main-content');
            mainContent.insertBefore(banner, mainContent.firstChild);
        }

        function showSuccess(message) {
            // Remove existing success banner
            const existing = document.querySelector('.success-banner');
            if (existing) existing.remove();

            const banner = document.createElement('div');
            banner.className = 'success-banner';
            banner.textContent = message;
            banner.style.backgroundColor = '#e8f5e9';
            banner.style.color = '#2e7d32';
            banner.style.padding = '1rem';
            banner.style.marginBottom = '1rem';
            banner.style.borderRadius = '4px';

            const mainContent = document.getElementById('main-content');
            mainContent.insertBefore(banner, mainContent.firstChild);
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', loadQuizzes);
    </script>
</body>
</html>
