<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Online Quiz System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- <a href="#main-content" class="skip-link">Skip to main content</a> -->

    <div id="navbar" data-nav="auth" data-active="dashboard"></div>

    <main id="main-content" class="container page">
        <section class="dashboard-header">
            <div class="dashboard-user-info">
                <h2>Welcome back, <span id="user-name"></span>!</h2>
                <p class="welcome-message text-secondary">Ready to test your knowledge?</p>
            </div>
            <div class="user-actions">
                <a href="/results" class="btn btn-primary">View Results</a>
                <a href="/profile" class="btn btn-outline">My Profile</a>
            </div>
        </section>

        <section class="quiz-cards-section">
            <h2>Available Quizzes</h2>
            <div id="quiz-cards-container" class="quiz-grid grid-3"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/components/navbar.js"></script>
    <script src="/js/main.js"></script>
    <script>
        // Check authentication and load quiz data
        async function checkAuthAndLoadData() {
            try {
                const response = await fetch('/api/auth/me');
                const data = await response.json();

                if (!response.ok || data.status !== 'success') {
                    window.location.href = '/login';
                    return;
                }

                // Set user name in the welcome message
                const name = data.data.full_name ||
                           (data.data.email ? data.data.email.split('@')[0] : '') ||
                           'User';
                document.getElementById('user-name').textContent = name;

                // Load quizzes
                const quizResponse = await fetch('/api/quizzes');
                const quizData = await quizResponse.json();

                const container = document.getElementById('quiz-cards-container');
                let quizArray = [];

                if (!quizResponse.ok) {
                    throw new Error('Failed to fetch quizzes');
                }

                // Normalize response shape
                if (quizData && quizData.status === 'success' && Array.isArray(quizData.data)) {
                    quizArray = quizData.data;
                } else if (Array.isArray(quizData)) {
                    quizArray = quizData;
                } else {
                    quizArray = [];
                }

                if (quizArray.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No quizzes available yet.</p>';
                    return;
                }

                container.innerHTML = ''; // Clear loading state

                quizArray.forEach(quiz => {
                    const card = document.createElement('div');
                    card.className = 'quiz-card card';
                    card.innerHTML = `
                        <h3 class="quiz-title text-primary">${quiz.title}</h3>
                        <p class="quiz-description text-secondary">${quiz.description || 'No description available'}</p>
                        <div class="quiz-meta">
                            <span class="meta-item"><i class="fas fa-question"></i> <span class="quiz-question-count">${quiz.question_count || 0}</span> Questions</span>
                            <span class="meta-item"><span class="quiz-duration">${quiz.time_limit || 0}</span> mins</span>
                            <span class="status-badge" id="quiz-status-badge-${quiz.id}">${quiz.is_active ? 'Active' : 'Inactive'}</span>
                        </div>
                        <a href="/quiz.html?id=${quiz.id}" class="btn btn-primary w-full">Start Quiz</a>
                    `;
                    // Set status badge class and text
                    const badge = card.querySelector(`#quiz-status-badge-${quiz.id}`);
                    badge.className = `status-badge ${quiz.is_active ? 'badge-success' : 'badge-secondary'}`;
                    badge.textContent = quiz.is_active ? 'Active' : 'Inactive';

                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('quiz-cards-container').innerHTML =
                    `<p class="error-message">Error loading dashboard: ${error.message}</p>`;
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', checkAuthAndLoadData);
    </script>
</body>
</html>
