<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Online Quiz System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- <a href="#main-content" class="skip-link">Skip to main content</a> -->
    <div class="container">
        <header>
            <h1>Online Quiz System</h1>
            <nav>
                <a href="/">Home</a> |
                <a href="/about">About</a> |
                <a href="/contact">Contact</a>
            </nav>
        </header>
        
        <main>
            <section>
                <h2>Contact Us</h2>
                <p>We'd love to hear from you! Whether you have questions, feedback, or just want to say hello, please fill out the form below.</p>
                
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Subject:</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
                
                <div id="form-response" class="mt-3"></div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 Online Quiz System. All rights reserved.</p>
        </footer>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
